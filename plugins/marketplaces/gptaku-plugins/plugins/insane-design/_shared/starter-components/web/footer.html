<!-- insane-build: web/footer.html — minimal footer, tokens consumed via variables -->
<footer class="footer">
  <div class="footer__inner">
    <div class="footer__brand">
      <a href="/" class="footer__logo">{BRAND_NAME}</a>
      <p class="footer__tagline">{FOOTER_TAGLINE}</p>
    </div>
    <div class="footer__cols">
      <div class="footer__col">
        <h4>{COL_1_HEADING}</h4>
        <a href="#">{COL_1_LINK_1}</a>
        <a href="#">{COL_1_LINK_2}</a>
      </div>
      <div class="footer__col">
        <h4>{COL_2_HEADING}</h4>
        <a href="#">{COL_2_LINK_1}</a>
        <a href="#">{COL_2_LINK_2}</a>
      </div>
    </div>
  </div>
  <div class="footer__base">
    <small>© {YEAR} {BRAND_NAME}. {LEGAL_NOTE}</small>
  </div>
</footer>

<style>
  .footer {
    padding: 80px var(--space-lg, 48px) 32px;
    background: var(--footer-bg, var(--bg, #fff));
    color: var(--fg-muted, #555);
    border-top: 1px solid var(--border, rgba(0,0,0,0.08));
    font-family: var(--font-family, system-ui, sans-serif);
  }
  .footer__inner {
    max-width: 1280px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 2fr; gap: 48px;
  }
  .footer__logo { font-size: 18px; font-weight: 600; color: var(--fg, #111); text-decoration: none; }
  .footer__tagline { margin: 12px 0 0; font-size: 14px; }
  .footer__cols { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .footer__col h4 { font-size: 14px; color: var(--fg, #111); margin: 0 0 12px; }
  .footer__col a { display: block; font-size: 14px; color: var(--fg-muted, #555); text-decoration: none; margin-bottom: 6px; }
  .footer__col a:hover { color: var(--fg, #111); }
  .footer__base {
    max-width: 1280px; margin: 48px auto 0;
    padding-top: 24px;
    border-top: 1px solid var(--border, rgba(0,0,0,0.08));
    font-size: 12px;
  }
</style>
